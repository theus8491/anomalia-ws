
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guilda Anomalia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0d0b09;
            color: #abdcb2;
            background-image: 
                radial-gradient(circle at 50% 10%, #291c13 0%, #0d0b09 60%),
                linear-gradient(to bottom, rgba(13, 11, 9, 0.95), rgba(7, 5, 4, 0.98));
            background-attachment: fixed;
        }
        h1, h2, h3, .font-rpg {
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 selection:bg-amber-600 selection:text-white">

    <main class="w-full max-w-md bg-[#1a1410] border-2 border-[#63452c] rounded-2xl p-8 shadow-2xl space-y-6">
        
        <!-- CABEÇALHO DO LOGIN -->
        <div class="text-center space-y-2">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-semibold bg-amber-950/80 text-amber-400 border border-amber-800/50 mb-1">
                <i class="fa-solid fa-shield-halved"></i> Acesso Restrito!
            </div>
            <h1 class="text-2xl font-black text-amber-100 font-rpg">Guilda Anomalia</h1>
            <p class="text-xs text-amber-600">Entre com suas credenciais para acessar o painel</p>
        </div>

        <!-- FORMULÁRIO -->
        <form id="loginForm" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-xs font-bold text-amber-400 font-rpg">E-mail</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-amber-700">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required placeholder="seu@email.com" 
                        class="w-full bg-[#130f0d] border border-[#422b17] rounded-xl py-2.5 pl-10 pr-4 text-xs text-amber-100 placeholder-amber-800 focus:outline-none focus:border-amber-600 transition">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-bold text-amber-400 font-rpg">Senha</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-amber-700">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="senha" required placeholder="••••••••" 
                        class="w-full bg-[#130f0d] border border-[#422b17] rounded-xl py-2.5 pl-10 pr-4 text-xs text-amber-100 placeholder-amber-800 focus:outline-none focus:border-amber-600 transition">
                </div>
            </div>

            <!-- MENSAGEM DE ERRO/SUCESSO -->
            <div id="mensagemStatus" class="text-xs text-center font-rpg min-h-[1rem]"></div>

            <!-- BOTÃO ENTRAR -->
            <button type="submit" id="btnEntrar" class="w-full bg-amber-600 hover:bg-amber-500 text-stone-950 font-bold py-3 rounded-xl text-xs font-rpg transition cursor-pointer shadow-lg flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Entrar no Painel
            </button>
        </form>

        <!-- VOLTAR -->
        <div class="text-center pt-2 border-t border-[#291c13]">
            <a href="index.html" class="text-xs text-amber-600 hover:text-amber-400 transition font-rpg">
                <i class="fa-solid fa-arrow-left mr-1"></i> Voltar para a Página Principal
            </a>
        </div>

    </main>

    <footer class="mt-8 text-center text-xs text-amber-700/60 font-rpg tracking-wider">
        GUILDA ANOMALIA &copy; 2026
    </footer>

    <script>
        const SUPABASE_URL = 'https://krabfzjnejvpatufolma.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_VIh6KfT200rJ28XySTS71g_w0tIO4s5';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('loginForm');
        const mensagemStatus = document.getElementById('mensagemStatus');
        const btnEntrar = document.getElementById('btnEntrar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensagemStatus.textContent = '';
            btnEntrar.disabled = true;
            btnEntrar.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            // Faz o login no Supabase Auth
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: senha
            });

            if (error) {
                console.error("Erro no login:", error.message);
                mensagemStatus.textContent = 'E-mail ou senha incorretos.';
                mensagemStatus.className = 'text-xs text-center text-red-400 font-rpg';
                btnEntrar.disabled = false;
                btnEntrar.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar no Painel';
            } else {
                mensagemStatus.textContent = 'Login realizado com sucesso! Redirecionando...';
                mensagemStatus.className = 'text-xs text-center text-emerald-400 font-rpg';
                setTimeout(() => {
                    window.location.href = 'painel.html';
                }, 800);
            }
        });
    </script>
</body>
</html>
